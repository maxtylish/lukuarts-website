<!DOCTYPE html>
<html lang="zh-Hant" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUKUARTS VISUAL | 青玥影像</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="about-page" style="overflow: hidden;">

    <div id="splash-screen">
        <img src="images/logo-zh.png" alt="LUKUARTS" style="width:50%; max-width:300px;">
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">LUKUARTS</a>
        <ul class="nav-links">
            <li><a href="index.html" data-en="Home" data-zh="首頁">Home</a></li>
            <li><a href="portfolio.html" data-en="Portfolio" data-zh="作品集">Portfolio</a></li>
            <li><a href="blog.html" data-en="Blog" data-zh="部落格">Blog</a></li>
            <li><a href="about.html" class="active" data-en="About" data-zh="關於">About</a></li>
            <li><button id="lang-toggle" class="lang-btn">EN / 中</button></li>
        </ul>
    </nav>

   <main class="section-padding">
        <div style="max-width: 1100px; margin: 0 auto; padding: 0 5%;">
            
            <h1 class="section-title" style="text-align: left; margin-bottom: 50px;" data-en="About Me" data-zh="關於我">關於我</h1>
            
            <div class="about-grid" style="display: grid; gap: 60px; align-items: center;">
                
                <div class="about-image-wrap">
                    <img src="images/your-photo.jpg" alt="About Me" style="width: 100%; border-radius: 4px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); object-fit: cover;">
                </div>
                
                <div class="about-text-wrap">
                    <h2 style="font-family: var(--font-heading); color: var(--accent-gold); font-size: 2.2rem; margin-bottom: 25px; line-height: 1.4;">
                        用光影捕捉故事的情感溫度
                    </h2>
                    
                    <div style="color: #ccc; font-weight: 300; line-height: 1.8; font-size: 1.05rem;">
                        <p style="margin-bottom: 20px;">
                            青玥影像 (LUKUARTS VISUAL) 是一個專注於人像與商業攝影的影像品牌。對我而言，攝影不只是按下快門，而是一種觀察世界的方式。
                        </p>
                        <p style="margin-bottom: 20px;">
                            透過光影、構圖與情感的細膩捕捉，我致力於將每一個瞬間轉化為雋永的視覺故事。無論是充滿溫度的個人肖像，還是強調質感的商業企劃，我都能提供最高品質的影像方案。
                        </p>
                    </div>
                </div>

            </div>
        </div>

        <style>
            .about-grid {
                grid-template-columns: 1fr 1fr; /* 電腦版雙欄 */
            }
            @media (max-width: 900px) {
                .about-grid {
                    grid-template-columns: 1fr; /* 手機版單欄 */
                    text-align: left;
                }
                .section-title {
                    text-align: center !important;
                }
            }
        </style>
    </main>

    <footer style="margin-top: 4rem; padding-bottom: 2rem; opacity: 0.6; font-size: 0.8rem; text-align: center;">
        <p>&copy; 2026 LUKUARTS VISUAL. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // 進版動畫邏輯
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                document.body.style.overflow = 'auto';
            }, 1000);
        });
    </script>
</body>
</html>
