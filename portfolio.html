<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio | LUKUARTS VISUAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar scrolled">
        <a href="index.html" class="logo">LUKUARTS</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html" class="active">Portfolio</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <div class="page-header">
            <h1>Portfolio</h1>
        </div>
        
        <div class="portfolio-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="portrait">Portrait</button>
            <button class="filter-btn" data-filter="food">Food</button>
            <button class="filter-btn" data-filter="event">Event</button>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item" data-category="portrait"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=800" class="lightbox-trigger" alt="Portrait" loading="lazy"></div>
            <div class="gallery-item" data-category="food"><img src="https://images.unsplash.com/photo-1473093295043-cdd812d0e601?auto=format&fit=crop&q=80&w=800" class="lightbox-trigger" alt="Food" loading="lazy"></div>
            <div class="gallery-item" data-category="event"><img src="https://images.unsplash.com/photo-1511556532299-8f662fc26c06?auto=format&fit=crop&q=80&w=800" class="lightbox-trigger" alt="Event" loading="lazy"></div>
            <div class="gallery-item" data-category="portrait"><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=800" class="lightbox-trigger" alt="Portrait" loading="lazy"></div>
            <div class="gallery-item" data-category="food"><img src="https://images.unsplash.com/photo-1484723091791-00d759ce4358?auto=format&fit=crop&q=80&w=800" class="lightbox-trigger" alt="Food" loading="lazy"></div>
            <div class="gallery-item" data-category="event"><img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&q=80&w=800" class="lightbox-trigger" alt="Event" loading="lazy"></div>
        </div>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" alt="Enlarged View">
    </div>

    <footer><p>&copy; 2026 LUKUARTS VISUAL. All Rights Reserved.</p></footer>
    <script src="script.js"></script>

</html>
