    /* ── 1. Booking Hero ─────────────────────────────────────── */
    .booking-hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }

    /* Left: photographer portrait */
    .booking-hero-photo {
      position: relative;
      overflow: hidden;
    }
    .booking-hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: grayscale(10%) contrast(1.05);
      transition: transform 0.8s var(--ease);
    }
    .booking-hero-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        transparent 60%,
        var(--bg-dark) 100%
      );
      pointer-events: none;
    }

    /* Right: intro content */
    .booking-hero-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: calc(var(--navbar-h) + 48px) clamp(32px, 5vw, 72px) 64px;
      background: var(--bg-dark);
      position: relative;
      z-index: 1;
    }
    .booking-hero-content .section-kicker {
      margin-bottom: var(--space-3);
    }
    .booking-hero-content h1 {
      font-family: var(--font-heading);
      font-size: clamp(2.2rem, 4.5vw, 3.4rem);
      color: var(--text-primary);
      letter-spacing: 4px;
      line-height: 1.2;
      margin-bottom: var(--space-2);
    }
    .booking-hero-content h1 span {
      color: var(--accent-gold);
    }
    .booking-hero-name {
      font-size: 0.8rem;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--surface-line);
    }
    .booking-hero-desc {
      color: var(--text-muted);
      font-size: 0.97rem;
      line-height: 1.9;
      margin-bottom: var(--space-5);
      max-width: 460px;
    }
    .booking-hero-btns {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    /* ── 2. Featured Works Slider ────────────────────────────── */
    .works-slider-section {
      position: relative;
      overflow: hidden;
      background: var(--bg-darker);

      text-align: center;
      padding: clamp(56px, 8vw, 96px) 0 clamp(32px, 4vw, 48px);

    .works-slider-header .section-kicker {
      margin-bottom: var(--space-2);
    }
    .works-slider-header h2 {
      font-family: var(--font-heading);
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      letter-spacing: 6px;
      color: var(--text-primary);
      text-transform: uppercase;
    }

      width: 100%;
      aspect-ratio: 16 / 7;
      overflow: hidden;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
      will-change: opacity;
    }
    .slide.active {
      opacity: 1;
    }

      height: 100%;

      display: block;

        transparent 50%
      );
