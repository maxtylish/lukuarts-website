<main class="portfolio-section">
    <div class="page-header" style="text-align: center; margin-bottom: 50px;">
        <h1 data-en="Contact Me" data-zh="聯絡預約">Contact Me</h1>
    </div>

    <section class="section-padding" style="max-width: 800px; margin: 0 auto; padding: 0 5%;">
        <form action="https://formspree.io/f/mgonlnrq" method="POST" style="display: grid; gap: 1.5rem; text-align: left;">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label style="color: var(--accent-gold); font-size: 0.8rem; letter-spacing: 1px;">NAME</label>
                    <input type="text" name="name" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: #fff; margin-top: 5px;">
                </div>
                <div class="form-group">
                    <label style="color: var(--accent-gold); font-size: 0.8rem; letter-spacing: 1px;">EMAIL</label>
                    <input type="email" name="email" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: #fff; margin-top: 5px;">
                </div>
            </div>

            <div class="form-group">
                <label style="color: var(--accent-gold); font-size: 0.8rem; letter-spacing: 1px;">SUBJECT (e.g. Portrait, Wedding...)</label>
                <input type="text" name="subject" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: #fff; margin-top: 5px;">
            </div>

            <div class="form-group">
                <label style="color: var(--accent-gold); font-size: 0.8rem; letter-spacing: 1px;">MESSAGE</label>
                <textarea name="message" rows="6" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: #fff; margin-top: 5px; resize: none;"></textarea>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button type="submit" class="btn btn-primary" style="padding: 15px 60px;">SEND MESSAGE</button>
            </div>
        </form>
    </section>
</main>
