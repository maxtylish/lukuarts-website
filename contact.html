<main class="portfolio-section">
    <div class="page-header">
        <h1 data-en="Contact" data-zh="聯絡我">Contact</h1>
    </div>

    <section class="section-padding" style="max-width: 800px; margin: 0 auto;">
        <p style="text-align: center; margin-bottom: 3rem; color: #ccc;" data-en="Let's create something beautiful together." data-zh="讓我們一起創造美麗的影像。">
            讓我們一起創造美麗的影像。
        </p>

        <form style="display: grid; gap: 1.5rem;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <input type="text" placeholder="Name" style="background: #111; border: 1px solid #333; padding: 1rem; color: #fff;">
                <input type="email" placeholder="Email" style="background: #111; border: 1px solid #333; padding: 1rem; color: #fff;">
            </div>
            <input type="text" placeholder="Subject" style="background: #111; border: 1px solid #333; padding: 1rem; color: #fff;">
            <textarea placeholder="Message" rows="6" style="background: #111; border: 1px solid #333; padding: 1rem; color: #fff; resize: none;"></textarea>
            
            <button type="submit" class="btn btn-primary" style="width: 200px; margin: 0 auto;">SEND MESSAGE</button>
        </form>

        <div style="margin-top: 4rem; text-align: center; display: flex; justify-content: center; gap: 2rem; color: var(--accent-gold);">
            <a href="#">INSTAGRAM</a>
            <a href="#">FACEBOOK</a>
            <a href="#">THREADS</a>
        </div>
    </section>
</main>
