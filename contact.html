<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | LUKUARTS VISUAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

</head>
<body>
    <nav class="navbar scrolled">
        <a href="index.html" class="logo">LUKUARTS</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="section-padding">
        <div class="contact-container">
            <h1 style="font-size: 3.5rem; margin-bottom: 1rem;">Get in Touch</h1>
            <p style="color: #aaa; margin-bottom: 3rem;">Available for commissions and visual storytelling worldwide.</p>
            
            <form onsubmit="event.preventDefault();">
                <div class="input-group"><input type="text" placeholder="Name" required></div>
                <div class="input-group"><input type="email" placeholder="Email" required></div>
                <div class="input-group"><textarea placeholder="Message" rows="5" required></textarea></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>

            <div class="social-links">
                <a href="mailto:maxtylish@hotmail.com">Email</a>
                <a href="https://instagram.com/LUKUARTS" target="_blank">Instagram</a>
            </div>
        </div>
    </main>

    <footer><p>&copy; 2026 LUKUARTS VISUAL. All Rights Reserved.</p></footer>
