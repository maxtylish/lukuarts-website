<!DOCTYPE html>
<html lang="zh-Hant" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | LUKUARTS VISUAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="about-page"> <nav class="navbar">
        <a href="index.html" class="logo">LUKUARTS</a>
        <ul class="nav-links">
            <li><a href="index.html" data-en="Home" data-zh="首頁">Home</a></li>
            <li><a href="portfolio.html" data-en="Portfolio" data-zh="作品集">Portfolio</a></li>
            <li><a href="blog.html" data-en="Blog" data-zh="部落格">Blog</a></li>
            <li><a href="about.html" data-en="About" data-zh="關於">About</a></li>
            <li><button id="lang-toggle" class="lang-btn">EN / 中</button></li>
        </ul>
    </nav>

    <main class="portfolio-section">
        <div class="page-header" style="text-align: center; margin-bottom: 50px;">
            <h1 data-en="Contact Me" data-zh="聯絡預約">Contact Me</h1>
        </div>

        <section class="section-padding" style="max-width: 800px; margin: 0 auto; padding: 0 5%;">
            <form action="https://formspree.io/f/你的ID" method="POST" class="contact-form">
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group" style="text-align: left;">
                        <label style="color: var(--accent-gold); font-size: 0.75rem; letter-spacing: 2px;">NAME</label>
                        <input type="text" name="name" placeholder="Your Name" required 
                               style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: #fff; margin-top: 5px;">
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label style="color: var(--accent-gold); font-size: 0.75rem; letter-spacing: 2px;">EMAIL</label>
                        <input type="email" name="email" placeholder="Your Email" required 
                               style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: #fff; margin-top: 5px;">
                    </div>
                </div>

                <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                    <label style="color: var(--accent-gold); font-size: 0.75rem; letter-spacing: 2px;">SUBJECT</label>
                    <input type="text" name="subject" placeholder="e.g. Portrait, Wedding Session..." 
                           style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: #fff; margin-top: 5px;">
                </div>

                <div class="form-group" style="text-align: left; margin-bottom: 2.5rem;">
                    <label style="color: var(--accent-gold); font-size: 0.75rem; letter-spacing: 2px;">MESSAGE</label>
                    <textarea name="message" rows="6" placeholder="Tell me about your project..." required 
                              style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: #fff; margin-top: 5px; resize: none;"></textarea>
                </div>

                <div style="text-align: center;">
                    <button type="submit" class="btn btn-primary" style="padding: 1rem 4rem; font-weight: 600;">SEND MESSAGE</button>
                </div>
            </form>
        </section>
    </main>

    <footer style="margin-top: 4rem; padding-bottom: 2rem; opacity: 0.6; font-size: 0.8rem; text-align: center;">
        <p>&copy; 2026 LUKUARTS VISUAL. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
