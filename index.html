<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUKUARTS VISUAL | 青玥影像 | 台中攝影師</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">LUKUARTS</a>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </div>
        <ul class="nav-links">
            <li><a href="#home" class="active">首頁</a></li>
            <li><a href="#services">服務項目</a></li>
            <li><a href="#portfolio">作品集</a></li>
            <li><a href="#about">關於我</a></li>
        </ul>
    </nav>

    <main>
        <section id="home" class="hero">
            <div class="hero-bg"></div>
            <div class="hero-content">
                <h1 class="hero-en-title">LUKUARTS VISUAL</h1>
                <img src="images/logo-zh.png" alt="青玥影像" class="hero-zh-logo">
                <h2 class="hero-subtitle">台中攝影師｜人像・商業攝影</h2>
                <p class="hero-description">Portrait & Branding Photography<br>打造具有價值的形象與品牌畫面</p>
                <div class="hero-btns">
                    <a href="#portfolio" class="btn btn-outline">查看作品</a>
                    <a href="https://line.me/ti/p/~0932754860" target="_blank" class="btn btn-primary">立即預約</a>
                </div>
                <p class="hero-location-tag">台中｜全台接案</p>
            </div>
        </section>

        <section id="services" class="section-padding bg-darker">
            <h2 class="section-title">SERVICES</h2>
            <div class="services-grid">
                <div class="service-card">
                    <h3>人像攝影</h3>
                    <p>形象照 / 個人品牌 / 社群頭像</p>
                </div>
                <div class="service-card">
                    <h3>商業攝影</h3>
                    <p>品牌形象 / 商品 / 店家拍攝</p>
                </div>
                <div class="service-card">
                    <h3>活動紀錄</h3>
                    <p>講座 / 活動 / 現場紀實</p>
                </div>
                <div class="service-card">
                    <h3>親子寫真</h3>
                    <p>自然互動 / 戶外拍攝</p>
                </div>
            </div>
        </section>

        <section id="portfolio" class="section-padding">
            <h2 class="section-title">PORTFOLIO</h2>
            <div class="filter-container">
                <button class="filter-btn active" data-filter="all">ALL</button>
                <button class="filter-btn" data-filter="portrait">人像攝影</button>
                <button class="filter-btn" data-filter="commercial">商業攝影</button>
                <button class="filter-btn" data-filter="event">活動紀錄</button>
                <button class="filter-btn" data-filter="kids">親子寫真</button>
            </div>
            <div class="masonry-gallery" id="gallery"></div>
        </section>

    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
