<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUKUARTS VISUAL | 青玥影像</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
    /* 進版畫面強制置頂樣式 */
    #splash-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      opacity: 1;
      visibility: visible;
    }

    .splash-logo {
      width: 60%;
      max-width: 400px;
      /* 金色發光濾鏡 */
      filter: invert(1) sepia(1) saturate(3) hue-rotate(350deg) brightness(1.2) drop-shadow(0 0 20px rgba(201, 169, 110, 0.8));
      animation: goldPulse 2.5s infinite ease-in-out;
    }

    @keyframes goldPulse {
      0%, 100% { transform: scale(1); filter: invert(1) sepia(1) saturate(3) hue-rotate(350deg) brightness(1) drop-shadow(0 0 10px rgba(201, 169, 110, 0.4)); }
      50% { transform: scale(1.05); filter: invert(1) sepia(1) saturate(3) hue-rotate(350deg) brightness(1.3) drop-shadow(0 0 25px rgba(201, 169, 110, 0.9)); }
    }
    
    .splash-fade-out {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
    </style>
</head>
<body style="overflow: hidden;"> 
    
    <div id="splash-screen">
      <img src="images/logo-zh.png" alt="LUKUARTS VISUAL" class="splash-logo">
    </div>

    <script>
      /* 設定 1 秒後開始淡出 */
      window.onload = function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('splash-fade-out');
            document.body.style.overflow = 'auto'; 
          }
        }, 1000); 
      };
    </script>

    <nav class="navbar">
        <a href="index.html" class="logo">LUKUARTS</a>
        <ul class="nav-links">
            <li><a href="index.html" class="active" data-en="Home" data-zh="首頁">Home</a></li>
            <li><a href="portfolio.html" data-en="Portfolio" data-zh="作品集">Portfolio</a></li>
            <li><a href="about.html" data-en="About" data-zh="關於">About</a></li>
            <li><a href="contact.html" data-en="Contact" data-zh="聯絡我">Contact</a></li>
            <li><button id="lang-toggle" class="lang-btn">EN / 中</button></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-bg"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <p class="hero-en-title">LUKUARTS VISUAL</p>
                <img src="images/logo-zh.png" alt="青玥影像" class="hero-zh-logo">
                <p data-en="Portrait & Commercial Photography" data-zh="人像與商業攝影">Portrait & Commercial Photography</p>
                <a href="portfolio.html" class="btn btn-primary" data-en="View Portfolio" data-zh="查看作品">View Portfolio</a>
            </div>
        </section>
        
        <section class="section-padding">
            <h2 class="section-title" data-en="Selected Works" data-zh="精選作品">Selected Works</h2>
            
            <div class="masonry-gallery" id="gallery">
                </div>
        </section>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <button class="lightbox-prev">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img">
        <button class="lightbox-next">&#10095;</button>
    </div>

    <footer>
        <p>&copy; 2026 LUKUARTS VISUAL. All Rights Reserved.</p>
        <div class="visitor-counter">
            <span data-en="VISITORS:" data-zh="來訪人數:">VISITORS:</span> 
            <span id="visit-count" style="color: var(--accent-gold); font-weight: 600;">...</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
