<!DOCTYPE html>
<html lang="zh-Hant" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUKUARTS VISUAL | 青玥影像</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 進版畫面 */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: 0.8s;
        }
    </style>
</head>
<body style="overflow: hidden;">

    <div id="splash-screen">
        <img src="images/logo-zh.png" alt="LUKUARTS" style="width:50%; max-width:300px; filter:invert(1) sepia(1) saturate(3) brightness(1.2);">
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">LUKUARTS</a>
        <ul class="nav-links">
            <li><a href="index.html" class="active" data-en="Home" data-zh="首頁">Home</a></li>
            <li><a href="portfolio.html" data-en="Portfolio" data-zh="作品集">Portfolio</a></li>
            <li><a href="blog.html" data-en="Blog" data-zh="部落格">Blog</a></li>
            <li><a href="about.html" data-en="About" data-zh="關於">About</a></li>
            <li><button id="lang-toggle" class="lang-btn">EN / 中</button></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-bg"></div>
            <div class="hero-content">
                <h1 class="hero-en-title">LUKUARTS VISUAL</h1>
                <img src="images/logo-zh.png" alt="青玥影像" class="hero-zh-logo">
                <p data-en="Portrait & Commercial Photography" data-zh="人像與商業攝影">Portrait & Commercial Photography</p>
                <div class="hero-btns">
                    <a href="portfolio.html" class="btn btn-primary" data-en="View Portfolio" data-zh="查看作品">View Portfolio</a>
                </div>
            </div>
        </section>

        <section class="section-padding">
            <h2 class="section-title" data-en="Selected Works" data-zh="精選作品">Selected Works</h2>
            <div class="masonry-gallery" id="gallery">
                </div>
        </section>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <button class="lightbox-prev">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img">
        <button class="lightbox-next">&#10095;</button>
    </div>

    <footer>
        <p>&copy; 2026 LUKUARTS VISUAL. All Rights Reserved.</p>
        <div class="visitor-counter">
            <span data-en="VISITORS:" data-zh="來訪人數:">VISITORS:</span> 
            <span id="visit-count">...</span>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                document.body.style.overflow = 'auto';
            }, 1000);
        });
    </script>
</body>
</html>
