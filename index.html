    <style>
    /* 進版畫面樣式 */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      /* 這裡確保 transition 有寫對 */
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    /* 金色發光濾鏡 */
    .splash-logo {
      width: 60%;
      max-width: 400px;
      filter: invert(1) sepia(1) saturate(3) hue-rotate(350deg) brightness(1.2) drop-shadow(0 0 20px rgba(201, 169, 110, 0.8));
      animation: goldPulse 2.5s infinite ease-in-out;
    }

    @keyframes goldPulse {
      0%, 100% { transform: scale(1); opacity: 1; filter: invert(1) sepia(1) saturate(3) hue-rotate(350deg) brightness(1) drop-shadow(0 0 10px rgba(201, 169, 110, 0.4)); }
      50% { transform: scale(1.05); opacity: 0.9; filter: invert(1) sepia(1) saturate(3) hue-rotate(350deg) brightness(1.3) drop-shadow(0 0 25px rgba(201, 169, 110, 0.9)); }
    }
    </style>
